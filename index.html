<!DOCTYPE html>
<html>
<head>
    <title>Student Grade Sheet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Student Grade Sheet</h1>

    <div class="student-info">
        <p><strong>Name:</strong> Rachel</p>
        <p><strong>Register No:</strong> 123456</p>
        <p><strong>Department:</strong> CSE</p>
        <p><strong>Semester:</strong> V</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Subject</th>
                <th>Marks</th>
                <th>Grade</th>
            </tr>
        </thead>

        <tbody id="resultTable">
        </tbody>
    </table>

    <div class="summary">
        <h3>Total Marks: <span id="total"></span></h3>
        <h3>Percentage: <span id="percentage"></span>%</h3>
        <h3>Result: <span id="result"></span></h3>
    </div>

    <button onclick="window.print()">Print Grade Sheet</button>

</div>

<script src="script.js"></script>
</body>
</html>
